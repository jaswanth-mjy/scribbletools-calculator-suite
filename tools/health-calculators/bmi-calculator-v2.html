        <div class="edu-section">
            <h2>📐 How to Calculate BMI - Step by Step</h2>
            
            <p style="color: #4a5568; font-size: 1.05rem; line-height: 1.8;">
                Body Mass Index (BMI) is a simple mathematical formula that helps assess whether your weight is healthy for your height. It's used worldwide by healthcare professionals as a quick screening tool.
            </p>
            
            <div class="formula-box">
                <h3 style="margin-top: 0; color: #2d3748;">The BMI Formula</h3>
                <div class="formula">BMI = weight (kg) ÷ height² (m²)</div>
                <p style="color: #718096; margin-top: 10px;">Or in Imperial units:</p>
                <div class="formula" style="font-size: 1.5rem;">BMI = (weight (lbs) ÷ height² (in²)) × 703</div>
            </div>
            
            <h3>🔢 Manual Calculation Example (Metric)</h3>
            <div class="example-box">
                <p style="color: #2d3748; font-weight: 600; margin-bottom: 15px;">Let's calculate BMI for a person who is 170 cm tall and weighs 70 kg:</p>
                
                <div class="step" data-step="1">
                    <strong>Convert height to meters:</strong><br>
                    170 cm ÷ 100 = 1.70 m
                </div>
                
                <div class="step" data-step="2">
                    <strong>Square the height:</strong><br>
                    1.70 × 1.70 = 2.89 m²
                </div>
                
                <div class="step" data-step="3">
                    <strong>Divide weight by squared height:</strong><br>
                    70 ÷ 2.89 = 24.2
                </div>
                
                <div class="step" data-step="4">
                    <strong>Result:</strong><br>
                    BMI = <span style="color: #48bb78; font-size: 1.3rem; font-weight: 700;">24.2</span> (Normal Weight)
                </div>
            </div>
            
            <h3>🔢 Manual Calculation Example (Imperial)</h3>
            <div class="example-box">
                <p style="color: #2d3748; font-weight: 600; margin-bottom: 15px;">For a person who is 67 inches tall and weighs 154 lbs:</p>
                
                <div class="step" data-step="1">
                    <strong>Square the height:</strong><br>
                    67 × 67 = 4,489 in²
                </div>
                
                <div class="step" data-step="2">
                    <strong>Divide weight by squared height:</strong><br>
                    154 ÷ 4,489 = 0.0343
                </div>
                
                <div class="step" data-step="3">
                    <strong>Multiply by 703:</strong><br>
                    0.0343 × 703 = 24.1
                </div>
                
                <div class="step" data-step="4">
                    <strong>Result:</strong><br>
                    BMI = <span style="color: #48bb78; font-size: 1.3rem; font-weight: 700;">24.1</span> (Normal Weight)
                </div>
            </div>
        </div>

    <script>
        let currentUnit = 'metric';
        
        // DOM Elements
        const unitBtns = document.querySelectorAll('.unit-btn');
        const weightUnit = document.getElementById('weightUnit');
        const heightUnit = document.getElementById('heightUnit');
        const weightInput = document.getElementById('weight');
        const heightInput = document.getElementById('height');
        const bmiForm = document.getElementById('bmiForm');
        const placeholder = document.getElementById('placeholder');
        const results = document.getElementById('results');
        const bmiValue = document.getElementById('bmiValue');
        const bmiCat = document.getElementById('bmiCat');
        const healthTips = document.getElementById('healthTips');
        const tipsTitle = document.getElementById('tipsTitle');
        const tipsContent = document.getElementById('tipsContent');
        
        // Unit Toggle
        unitBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                unitBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentUnit = btn.dataset.unit;
                
                if (currentUnit === 'metric') {
                    weightUnit.textContent = '(kg)';
                    heightUnit.textContent = '(cm)';
                    weightInput.placeholder = 'e.g., 70';
                    heightInput.placeholder = 'e.g., 170';
                } else {
                    weightUnit.textContent = '(lbs)';
                    heightUnit.textContent = '(inches)';
                    weightInput.placeholder = 'e.g., 154';
                    heightInput.placeholder = 'e.g., 67';
                }
                
                weightInput.value = '';
                heightInput.value = '';
            });
        });
        
        // Calculate BMI
        bmiForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            let weight = parseFloat(weightInput.value);
            let height = parseFloat(heightInput.value);
            
            if (!weight || !height) {
                alert('Please enter valid weight and height');
                return;
            }
            
            // Convert to metric if needed
            if (currentUnit === 'imperial') {
                weight = weight * 0.453592;
                height = height * 2.54;
            }
            
            // Calculate BMI
            const heightM = height / 100;
            const bmi = (weight / (heightM * heightM)).toFixed(1);
            
            // Get category
            const category = getBMICategory(parseFloat(bmi));
            
            // Calculate ideal weight
            const idealMin = (18.5 * heightM * heightM).toFixed(1);
            const idealMax = (24.9 * heightM * heightM).toFixed(1);
            
            // Display
            showResults(bmi, category, idealMin, idealMax);
        });
        
        function getBMICategory(bmi) {
            if (bmi < 18.5) {
                return { name: 'Underweight', color: '#3b82f6' };
            } else if (bmi < 25) {
                return { name: 'Normal Weight', color: '#10b981' };
            } else if (bmi < 30) {
                return { name: 'Overweight', color: '#f59e0b' };
            } else {
                return { name: 'Obese', color: '#ef4444' };
            }
        }
        
        function showResults(bmi, category, minWeight, maxWeight) {
            placeholder.style.display = 'none';
            results.classList.add('show');
            
            bmiValue.textContent = bmi;
            bmiValue.style.color = category.color;
            bmiCat.textContent = category.name;
            bmiCat.style.color = category.color;
            
            const tips = getTips(category.name, minWeight, maxWeight);
            tipsTitle.textContent = tips.title;
            healthTips.style.borderLeftColor = category.color;
            
            let idealText = '';
            if (currentUnit === 'metric') {
                idealText = `<p style="margin-bottom: 15px;">Ideal weight range: <strong>${minWeight} - ${maxWeight} kg</strong></p>`;
            } else {
                const minLbs = (minWeight * 2.20462).toFixed(1);
                const maxLbs = (maxWeight * 2.20462).toFixed(1);
                idealText = `<p style="margin-bottom: 15px;">Ideal weight range: <strong>${minLbs} - ${maxLbs} lbs</strong></p>`;
            }
            
            tipsContent.innerHTML = idealText + '<ul>' + tips.list.map(t => `<li>${t}</li>`).join('') + '</ul>';
            
            results.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function getTips(category, min, max) {
            const tips = {
                'Underweight': {
                    title: '⚠️ You are Underweight',
                    list: [
                        'Consult a healthcare provider',
                        'Focus on nutrient-dense foods',
                        'Include healthy fats and proteins',
                        'Consider strength training',
                        'Eat frequent, smaller meals'
                    ]
                },
                'Normal Weight': {
                    title: '✅ Healthy Weight',
                    list: [
                        'Maintain healthy eating habits',
                        'Stay physically active',
                        'Eat variety of fruits and vegetables',
                        'Stay hydrated',
                        'Continue regular check-ups'
                    ]
                },
                'Overweight': {
                    title: '⚠️ You are Overweight',
                    list: [
                        'Aim for gradual weight loss',
                        'Increase physical activity',
                        'Focus on portion control',
                        'Reduce processed foods',
                        'Consider nutritionist guidance'
                    ]
                },
                'Obese': {
                    title: '🚨 Obese Range',
                    list: [
                        'Consult healthcare provider',
                        'Create safe weight loss plan',
                        'Start with moderate activities',
                        'Focus on sustainable changes',
                        'Monitor related health conditions'
                    ]
                }
            };
            
            return tips[category] || tips['Normal Weight'];
        }
    </script>
